name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Edge Functions

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions
        run: |
          supabase functions deploy email-intake      --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy gemini-processor  --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy send-approval     --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy process-approval  --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy generate-csv      --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy reminder-scheduler --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy sync-approvers    --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set Edge Function secrets
        run: |
          supabase secrets set \
            GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            AZURE_TENANT_ID="${{ secrets.AZURE_TENANT_ID }}" \
            AZURE_CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}" \
            AZURE_CLIENT_SECRET="${{ secrets.AZURE_CLIENT_SECRET }}" \
            FINANCE_MAILBOX="${{ secrets.FINANCE_MAILBOX }}" \
            FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
            REMINDER_DAYS="${{ secrets.REMINDER_DAYS }}" \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
