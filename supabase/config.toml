# Supabase project configuration
# Project ref: alcfqmolvnjnmylopsgb

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
# File size limit for invoice uploads (50 MB)
file_size_limit = "52428800"

[auth]
enabled = true
# Finance mailbox redirect after Azure AD login
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "https://localhost:5173",
  "http://localhost:5173/auth/callback"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false
enable_anonymous_sign_ins = false

[auth.external.azure]
enabled = true
# Set these via environment variables or Supabase dashboard
client_id = "env(AZURE_CLIENT_ID)"
secret = "env(AZURE_CLIENT_SECRET)"
url = ""
redirect_uri = ""

[analytics]
enabled = false
