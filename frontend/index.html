<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sotara</title>
    <meta name="description" content="Invoice & expense approval system" />
    <meta name="application-name" content="Sotara" />

    <!-- ── PWA / theme ───────────────────────────────────────────────────── -->
    <meta name="theme-color" content="#070918" />
    <meta name="color-scheme" content="dark" />

    <!-- ── iOS PWA ───────────────────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sotara" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Favicons ──────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- ── Splash screens (iOS) — generated from icon + background colour ─ -->
    <meta name="msapplication-TileColor" content="#070918" />

    <!-- ── Fonts ─────────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- ── Inline critical styles to prevent flash ───────────────────────── -->
    <style>
      html, body { margin: 0; padding: 0; background: #070918; }
      /* Safe-area padding for notched phones */
      :root {
        --safe-top:    env(safe-area-inset-top,    0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left:   env(safe-area-inset-left,   0px);
        --safe-right:  env(safe-area-inset-right,  0px);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
